version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: revlosport_db
    restart: unless-stopped
    environment:
      MYSQL_USER: ${MYSQL_USER:-revlo}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-revlosport_kb}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - internal

  app:
    build: .
    container_name: revlosport_app
    restart: unless-stopped
    depends_on:
      - db
    environment:
      DATABASE_URL: mysql://${MYSQL_USER:-revlo}:${MYSQL_PASSWORD}@db:3306/${MYSQL_DATABASE:-revlosport_kb}
      NEXTAUTH_URL: ${NEXTAUTH_URL}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      KB_API_KEY: ${KB_API_KEY}
    networks:
      - internal
      - web

  nginx:
    image: nginx:alpine
    container_name: revlosport_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - app
    networks:
      - web

volumes:
  mysql_data:

networks:
  internal:
  web:
